  #carousel_slider: ^4.2.1
  google_maps_flutter: ^2.3.1
  geolocator: ^13.0.2
  flutter_facebook_auth: ^4.1.1
  shimmer: ^3.0.0
  geocoding: ^3.0.0
  lottie: ^2.5.0
  firebase_analytics: ^10.4.5
  firebase_core: ^2.15.1
  share_plus: ^7.1.0
  app_links: ^3.5.0
  telephony: ^0.2.0
