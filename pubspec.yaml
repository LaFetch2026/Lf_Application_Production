name: lafetch
description: A new Flutter project.
publish_to: "none"

version: 1.1.6+54

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_screenutil: ^5.0.0
  flutter_otp_text_field: ^1.1.1
  http: ^0.13.4
  dropdown_button2: ^2.1.3
  image_picker: ^0.8.7+5
  get: ^4.6.5
  shared_preferences: ^2.1.2
  dio: ^5.2.1+1
  url_launcher: ^6.1.11
  dotted_border: ^2.0.0+3
  change_app_package_name: ^1.1.0
  logger: ^1.1.0
  flutter_staggered_grid_view: ^0.7.0
  flutter_rating_bar: ^4.0.1
  order_tracker: ^0.0.2

  getwidget: ^6.0.0
  cached_network_image: ^3.3.1
  flutter_cache_manager: ^3.3.1
  razorpay_flutter: ^1.3.7
  intl: ^0.17.0
  onesignal_flutter: ^5.0.3
  device_info_plus: ^9.0.2
  video_player: ^2.7.0
  mime: ^1.0.4
  add_to_cart_animation: ^2.0.3
  google_maps_flutter: ^2.3.1
  geolocator: ^10.0.0

  shimmer: ^3.0.0
  geocoding: ^3.0.0
  lottie: ^2.5.0

  firebase_analytics: ^11.3.3
  firebase_auth: ^5.3.1
  firebase_core: ^3.6.0
  firebase_crashlytics: ^4.1.3
  firebase_messaging: ^15.1.3
  google_sign_in: ^6.2.1

  share_plus: ^7.1.0
  app_links: ^3.5.0
  otp_text_field_v2: ^1.0.3

  photo_view: ^0.15.0
  flutter_polyline_points: ^1.0.0

  flutter_local_notifications: ^17.1.2
  animate_do: ^2.1.0
  flutter_staggered_animations: ^1.0.0
  flutter_quill: ^7.2.0
  permission_handler: ^12.0.1
  webview_flutter: ^4.13.0
  carousel_slider_plus: ^7.1.0
  google_maps_webservice: ^0.0.18
  page_indicator_plus: ^1.0.4
  dotted_line: ^3.2.3
  app_tracking_transparency: ^2.0.6+1
  flutter_svg: ^2.0.5
  marquee: ^2.3.0

  appsflyer_sdk: ^6.15.2
  pinput: ^5.0.0
  go_router: ^16.1.0
  flutter_launcher_icons: ^0.14.4
  fluttertoast: ^8.2.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter_launcher_icons:
  ios: true
  android: true
  image_path: "assets/icon/IMG_1367.PNG"
  remove_alpha_ios: true

flutter:
  uses-material-design: true

  assets:
    - assets/
    - assets/images/

  fonts:
    - family: Clash Display Bold
      fonts:
        - asset: fonts/ClashDisplay-Bold.otf
          weight: 700
    - family: Clash Display Semibold
      fonts:
        - asset: fonts/ClashDisplay-Semibold.otf
          weight: 600
    - family: Clash Display Light
      fonts:
        - asset: fonts/ClashDisplay-Light.otf
          weight: 300
    - family: Clash Display
      fonts:
        - asset: fonts/ClashDisplay-Medium.otf
          weight: 500
    - family: Clash Display Regular
      fonts:
        - asset: fonts/ClashDisplay-Regular.otf
          weight: 400
    - family: Clash Display Medium
      fonts:
        - asset: fonts/ClashDisplay-Extralight.otf
          weight: 400
